server:
  port: 8083
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sportclub
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  main:
    allow-bean-definition-overriding: true